
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JewelRetouch Pro | Furkan Daldal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fcfcfc;
        background-image: 
          radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0),
          linear-gradient(to right, rgba(0,0,0,0.01) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0,0,0,0.01) 1px, transparent 1px);
        background-size: 24px 24px, 120px 120px, 120px 120px;
      }
      .luxury-shadow {
        box-shadow: 0 10px 50px -12px rgba(0, 0, 0, 0.08);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .slider-handle {
        width: 4px;
        height: 100%;
        background: white;
        position: absolute;
        left: 50%;
        top: 0;
        cursor: col-resize;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        z-index: 20;
      }
      .slider-circle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        z-index: 21;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="transition-colors duration-500">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(243, 244, 246, 1);
      }
      .dark {
        --glass-bg: rgba(15, 23, 42, 0.8);
        --glass-border: rgba(30, 41, 59, 1);
      }
      .dark body {
        background-color: #020617; /* Deepest blue/black */
        background-image: 
          radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
        background-size: 32px 32px;
        color: white;
      }
      .glass-card {
        background: var(--glass-bg);
        backdrop-blur: 16px;
        border: 1px solid var(--glass-border);
      }
      .luxury-shadow {
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      }
      .dark .luxury-shadow {
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      /* Custom scrollbar for dark mode */
      .dark ::-webkit-scrollbar {
        width: 10px;
      }
      .dark ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 5px;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
    </style>
  </body>
</html>
